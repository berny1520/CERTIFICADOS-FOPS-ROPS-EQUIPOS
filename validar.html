<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Validación de certificado | XTREME MINING</title>
<link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
<main class="validate-wrap">
  <a href="./index.html" class="back">← Volver al catálogo</a>
  <section class="validate-card" id="validacion"></section>
</main>
<script src="./js/data.js"></script>
<script>
(function(){
 const params = new URLSearchParams(location.search);
 const id = params.get('id') || '';
 const e = (window.EQUIPOS || []).find(x => x.codigo === id);
 const el = document.getElementById('validacion');
 if(!e){ el.innerHTML = `<div class="status bad">No encontrado</div><h1>Certificado no encontrado</h1><p>No existe registro para el código: <b>${id}</b></p>`; return; }
 const ok = e.estado === 'Certificado';
 el.innerHTML = `
   <div class="status ${ok?'ok':'warn'}">${ok?'CERTIFICADO VIGENTE / REGISTRADO':'PENDIENTE DE CERTIFICADO'}</div>
   <h1>${e.codigo}</h1>
   <h2>${e.equipo}</h2>
   <div class="detail-grid">
     <div><span>Tipo</span><b>${e.tipo}</b></div>
     <div><span>Marca</span><b>${e.marca || 'No informado'}</b></div>
     <div><span>Modelo</span><b>${e.modelo || 'No informado'}</b></div>
     <div><span>Serie</span><b>${e.serie || 'No informado'}</b></div>
     <div><span>Rig</span><b>${e.rig || 'No informado'}</b></div>
     <div><span>Documento</span><b>${e.tipo_certificado}</b></div>
   </div>
   <div class="actions">
     ${e.certificado_pdf ? `<a class="btn" href="${e.certificado_pdf}" target="_blank" rel="noopener">Abrir certificado PDF</a>` : `<button class="btn disabled">PDF pendiente</button>`}
     <button class="btn ghost" onclick="window.print()">Imprimir ficha</button>
   </div>
   ${e.qr ? `<img class="qr" src="${e.qr}" alt="QR ${e.codigo}">` : ''}
 `;
})();
</script>
</body>
</html>
